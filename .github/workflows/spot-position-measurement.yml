name: spot-position-measurement

# One-off MEASUREMENT-ONLY workflow. Triggered manually via the Actions
# UI; nothing scheduled, nothing automatic. Writes NOTHING back to
# spots_enriched.json or the database — produces three JSON artifacts
# (geocode_fixed / osm_fixed / manual_needed) plus a summary and log
# that we download and review.
#
# Why a workflow: this sandbox can't reach Nominatim / Overpass / the
# GSHHG mirrors. A GitHub Actions runner has unrestricted outbound,
# which is what makes the measurement possible at all.

on:
  workflow_dispatch:
    inputs:
      contact_email:
        description: Contact email used in Nominatim User-Agent (per OSM policy)
        required: true
        default: l.nunnery11@gmail.com
      limit:
        description: Process at most N broken spots through recovery (0 = all)
        required: false
        default: '0'

# Track the Node.js 24 runner default like the other workflows.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: spot-position-measurement
  cancel-in-progress: false

jobs:
  measure:
    name: measure spot positions (read-only)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      PYTHONUNBUFFERED: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      CONTACT_EMAIL: ${{ inputs.contact_email }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline Python deps
        # The repo's requirements.txt already pins shapely/fiona/pyproj/
        # rtree/scipy/numpy/requests/rapidfuzz/reverse_geocoder, which is
        # everything the measurement script needs. No need for eccodes.
        run: pip install -r pipeline/requirements.txt

      - name: Download GSHHG L1 shoreline (~150 MB, 3 mirrors, cached)
        id: geodata-cache
        uses: actions/cache@v4
        with:
          path: pipeline/geodata
          key: geodata-v1-${{ hashFiles('pipeline/download_geodata.sh') }}

      - name: Run download_geodata.sh (only if cache missed)
        if: steps.geodata-cache.outputs.cache-hit != 'true'
        run: bash pipeline/download_geodata.sh

      - name: Run spot-position measurement
        run: |
          python -m pipeline.measure_spot_positions \
            --contact-email "${CONTACT_EMAIL}" \
            --limit "${{ inputs.limit }}" \
            --verbose

      - name: Show summary in the log
        if: always()
        run: |
          if [[ -f pipeline/measurement_output/measurement_summary.json ]]; then
            echo "=== summary ==="
            cat pipeline/measurement_output/measurement_summary.json
            echo
            echo "=== last 50 lines of log ==="
            tail -n 50 pipeline/measurement_output/measurement_log.txt || true
          else
            echo "(no summary file written)"
          fi

      - name: Upload measurement artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spot-position-measurement
          path: pipeline/measurement_output/
          if-no-files-found: warn
          retention-days: 14
