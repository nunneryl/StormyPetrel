name: forecast-pipeline

# Two scheduled jobs in one workflow:
#   - full-pipeline   every 8h (03:30 / 11:30 / 19:30 UTC), runs the full
#                     NWPS + WW3 + HRRR + buoys + tides fetch + interpret +
#                     Supabase push. 8-hour cadence is enough freshness
#                     for surf-forecast use while cutting Actions minutes
#                     by a third vs. the prior every-6h schedule.
#   - buoy-update     every 1h on the hour. NDBC publishes obs every
#                     30–60 min, so a 1-hour cadence keeps the "now"
#                     reading near-real-time. Vercel Pro removed the
#                     ISR Write cap that previously made the 3-hour
#                     cadence the right tradeoff; only / and /map are
#                     revalidated so spot pages aren't touched.
#
# Manual trigger via the Actions tab — pick which job to run from the
# `job` input dropdown. Both jobs gate themselves with an `if:` so a
# scheduled trigger only fires the matching job.

on:
  workflow_dispatch:
    inputs:
      job:
        description: Which job to run (manual trigger only)
        required: true
        default: full-pipeline
        type: choice
        options:
          - full-pipeline
          - buoy-update
  schedule:
    # Forecast pipeline runs every 8h. Lines up with NCEP's 00/06/12/18Z
    # model cycles plus ~90 min for uploads — picks 00Z+3h30, 06Z+5h30,
    # 12Z+7h30 in practice but the spacing is what matters: an 8-hour
    # cadence is enough freshness for the surf use case at lower runner
    # cost than every-6h.
    - cron: '30 3,11,19 * * *'
    # Buoy refresh hourly. NDBC publishes ~every 30 min, so this keeps
    # the "now" reading inside the 30-min freshness window most of the
    # time. Only revalidates / and /map (not spot pages) so the higher
    # cadence doesn't fan out into per-spot ISR Writes.
    - cron: '0 * * * *'

# Opt JavaScript-based actions (checkout, setup-python, github-script,
# cache) onto the Node.js 24 runner. Node 20 is deprecated and gets
# removed from GitHub-hosted runners 2026-09-16; flipping this now
# silences the deprecation warning and tracks the new default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Limit concurrency per logical job — if a previous run is still going,
# the new schedule trigger waits or replaces it (cancel-in-progress=false
# avoids killing a healthy run mid-upload).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.schedule || inputs.job }}
  cancel-in-progress: false

jobs:
  full-pipeline:
    name: full-pipeline (NWPS + WW3 + HRRR + buoys + tides)
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 3,11,19 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'full-pipeline')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # The default GITHUB_TOKEN is read-only on Issues; the failure
    # notification step needs `issues: write` to call POST /issues.
    # contents:read is required for the checkout action under the
    # restrictive default token policy.
    permissions:
      contents: read
      issues: write
    env:
      # supabase-py reads SUPABASE_URL / SUPABASE_SERVICE_KEY; mirror to
      # NEXT_PUBLIC_SUPABASE_URL too so any code that reads either works.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      REVALIDATE_URL: https://stormypetrel.surf/api/revalidate
      REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
      # Don't buffer Python output — make logs visible in real time so a
      # stuck step is debuggable from the live Actions tail.
      PYTHONUNBUFFERED: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install eccodes (cfgrib's GRIB-2 backend)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libeccodes0 unzip

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Restore geodata cache
        id: geodata-cache
        uses: actions/cache@v4
        with:
          path: pipeline/geodata
          # Keyed on the script content — bump key automatically when the
          # download list changes.
          key: geodata-v1-${{ hashFiles('pipeline/download_geodata.sh') }}

      - name: Download geodata (only if cache missed)
        if: steps.geodata-cache.outputs.cache-hit != 'true'
        run: bash pipeline/download_geodata.sh

      - name: Create runtime directories
        run: mkdir -p pipeline/cache pipeline/forecast_data

      - name: Fetch all forecast / observation sources
        run: python -m pipeline.forecast.fetch_all

      - name: Interpret (compute ratings)
        run: python -m pipeline.interpret

      - name: Snapshot pre-write spot ratings (for diff in revalidate step)
        run: python -m pipeline.revalidate --snapshot pipeline/forecast_data/ratings_snapshot.json

      - name: Push to Supabase (spots + forecasts + buoys + tides)
        run: python -m pipeline.db_import --all

      - name: Revalidate ISR cache (home + map + regions + CHANGED spot pages only)
        run: python -m pipeline.revalidate --scope full --diff-from pipeline/forecast_data/ratings_snapshot.json

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[cron] full-pipeline failed (run ${context.runNumber})`,
              body: [
                `The scheduled forecast pipeline failed at \`${new Date().toISOString()}\`.`,
                ``,
                `**Run logs:** ${runUrl}`,
                ``,
                `Common causes:`,
                `- NOMADS rate-limit / missing cycle (will self-resolve next run)`,
                `- Supabase TLS hiccup mid-upsert (re-run is idempotent)`,
                `- New cfgrib variable name in a GRIB (check the first-step diagnostic in the log)`,
              ].join('\n'),
              labels: ['cron-failure', 'forecast-pipeline'],
            });

  buoy-update:
    name: buoy-update (hourly NDBC refresh)
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'buoy-update')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      REVALIDATE_URL: https://stormypetrel.surf/api/revalidate
      REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
      PYTHONUNBUFFERED: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Create runtime directories
        run: mkdir -p pipeline/cache pipeline/forecast_data

      - name: Fetch buoy observations
        run: python -m pipeline.forecast.fetch_all --only buoys --no-cache

      - name: Push buoy_observations to Supabase
        run: python -m pipeline.db_import --buoys-only

      - name: Revalidate ISR cache (home + map)
        run: python -m pipeline.revalidate --scope buoys
