name: buoy-ready-monitor

# Scheduled, READ-ONLY monitor. Notifies (via a GitHub Issue -> email) when a
# trust-check zone has a qualifying SWELL EVENT to check: a watched NDBC buoy is UP,
# a USABLE reference (VALID/MARGINAL — invalid/retired buoys like 44098 are never
# flagged), showing real swell (gate precondition, sustained), and the zone's rolling
# DIRECTION verdict is still ACCUMULATING. Running --trustcheck adds ONE event toward
# that verdict (not a one-shot pass). NOT triggered by wave-height range anymore.
# Guardrails: no Supabase, no prod, no NOMADS, no secrets beyond GITHUB_TOKEN; read-only.

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch: {}       # manual run for testing

permissions:
  issues: write
  contents: read

concurrency:
  group: buoy-ready-monitor
  cancel-in-progress: false

jobs:
  buoy-ready:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps (read-only NDBC fetch + parse; numpy for the gate reuse)
        # numpy: the monitor now reuses the trust gate's precondition / pairing scorer / rolling
        # history from pipeline.forecast.nwps_nearshore (which imports numpy). cfgrib is NOT needed
        # (it is lazy — the monitor never loads a NOMADS grid). ndbc_spectral (swell) is pure-python.
        run: python -m pip install --upgrade pip requests tenacity numpy

      - name: Download public NDBC station roster (read-only, no secrets)
        run: |
          python - <<'PY'
          import urllib.request
          from pipeline.config import NDBC_STATIONS_XML, NDBC_LATEST_OBS_TXT
          NDBC_STATIONS_XML.parent.mkdir(parents=True, exist_ok=True)
          targets = [
              ("https://www.ndbc.noaa.gov/activestations.xml", NDBC_STATIONS_XML),
              ("https://www.ndbc.noaa.gov/data/latest_obs/latest_obs.txt", NDBC_LATEST_OBS_TXT),
          ]
          for url, dest in targets:
              req = urllib.request.Request(
                  url, headers={"User-Agent": "StormyPetrel-buoy-ready-monitor (+https://stormypetrel.surf)"})
              with urllib.request.urlopen(req, timeout=60) as r:
                  body = r.read()
              dest.write_bytes(body)
              print(f"downloaded {url} -> {dest} ({len(body)} bytes)")
          PY

      - name: Run buoy-ready monitor
        id: monitor
        run: python3 scripts/buoy_ready_monitor.py

      - name: Manage 'buoy-ready' issue
        uses: actions/github-script@v7
        env:
          ANY_FLAGGED: ${{ steps.monitor.outputs.any_flagged }}
          FLAGGED_JSON: ${{ steps.monitor.outputs.flagged_json }}
          MIN_EVENTS: ${{ steps.monitor.outputs.min_events }}
        with:
          script: |
            const LABEL = 'buoy-ready';
            const ASSIGNEE = 'nunneryl';
            const { owner, repo } = context.repo;
            const anyFlagged = process.env.ANY_FLAGGED === 'true';
            const flagged = JSON.parse(process.env.FLAGGED_JSON || '[]');
            const minEvents = process.env.MIN_EVENTS || '5';

            // 1. Ensure the label exists (create on first run).
            try {
              await github.rest.issues.getLabel({ owner, repo, name: LABEL });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: LABEL, color: '1d76db',
                  description: 'A trust-check zone has a qualifying swell event to accumulate',
                });
                core.info(`created label '${LABEL}'`);
              } else {
                throw e;
              }
            }

            // 2. Find an existing OPEN issue carrying the label.
            const found = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: LABEL, per_page: 20 });
            const existing = found.data.find(i => !i.pull_request);

            // flagged-set key, hidden marker, and body builder. Key on id:wfo (NOT id
            // alone) so a buoy shared across regions — e.g. a shared buoy under two wfos —
            // is two distinct members and can't collide or be dropped. Dedup is on this
            // set: an open issue is NOT re-notified while the same zones stay flagged.
            const setKey = flagged.map(r => `${r.id}:${r.wfo}`).sort().join(',');
            const marker = s => `<!-- buoy-ready-set:${s} -->`;
            const buildBody = () => {
              const items = flagged.map(r =>
                `- **${r.id}** [${r.wfo}] — ${r.zone} — swell Hs `
                + `${r.swell_hs == null ? 'n/a' : r.swell_hs + ' m'}, ${r.qual_hours} qualifying hr; `
                + `rolling **${r.rolling}** (${r.n_events}/${minEvents} events)`);
              const cmds = flagged.map(r =>
                '```\n'
                + `python3 -m pipeline.forecast.nwps_nearshore --trustcheck --wfo ${r.wfo} --buoy ${r.id}`
                + '\n```');
              return [
                `These zone(s) have a **qualifying swell event right now** — a usable buoy `
                  + `(VALID/MARGINAL) is showing real swell, and the zone's rolling DIRECTION verdict `
                  + `is still ACCUMULATING toward ${minEvents} independent events:`,
                '',
                items.join('\n'),
                '',
                '### Add a swell event (run the trust check)',
                `Each run CONTRIBUTES ONE event toward the zone's rolling verdict — it is NOT a `
                  + `one-shot PASS/FAIL. The gate settles only after ${minEvents} independent swell events.`,
                cmds.join('\n'),
                '',
                'Read-only monitor. Structurally-invalid / retired buoys (e.g. 44098) are never listed '
                  + '— there is no valid reference to test against. This issue auto-closes when no '
                  + 'watched zone has a qualifying swell event.',
                '',
                marker(setKey),
              ].join('\n');
            };

            const prevMatch = existing && (existing.body || '').match(/<!-- buoy-ready-set:([^>]*) -->/);
            const prevSet = prevMatch ? prevMatch[1].split(',').filter(Boolean) : [];

            if (anyFlagged && !existing) {
              // First flagged zone(s): open ONE issue (don't wait for all zones).
              const zones = [...new Set(flagged.map(r => r.zone))].join(', ');
              const issue = await github.rest.issues.create({
                owner, repo,
                title: `Buoy-ready: swell event to check — ${zones}`,
                body: buildBody(),
                labels: [LABEL],
                assignees: [ASSIGNEE],
              });
              core.info(`created buoy-ready issue #${issue.data.number} (set=${setKey})`);
            } else if (anyFlagged && existing) {
              // An issue is open. Re-notify ONLY if a NEW zone gained a swell event (dedup on set).
              const newly = flagged.filter(r => !prevSet.includes(`${r.id}:${r.wfo}`));
              if (newly.length > 0) {
                await github.rest.issues.update({
                  owner, repo, issue_number: existing.number, body: buildBody() });
                const nz = [...new Set(newly.map(r => r.zone))].join(', ');
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `New zone(s) with a swell event to check: **${nz}** (${newly.map(r => r.id).join(', ')}). `
                    + `Flagged-set is now \`${setKey}\`. Each --trustcheck run adds one event toward the `
                    + `zone's rolling verdict.` });
                core.info(`flagged-set grew -> ${setKey}; re-notified`);
              } else {
                core.info(`flagged-set unchanged (${setKey}); no duplicate notification`);
              }
            } else if (!anyFlagged && existing) {
              // No swell event anymore: close so the next swell re-triggers a fresh email.
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number,
                body: `No watched zone has a qualifying swell event anymore. Closing — the next swell `
                  + `event will open a fresh alert.` });
              await github.rest.issues.update({
                owner, repo, issue_number: existing.number, state: 'closed' });
              core.info('closed buoy-ready issue (no swell events)');
            } else {
              core.info('no swell events and no open issue; nothing to do');
            }
