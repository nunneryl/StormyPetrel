name: buoy-liveness-monitor

# Scheduled, READ-ONLY buoy-LIVENESS monitor. Detects when a reference buoy that anchors one
# or more NWPS-placed surf zones has stopped producing wave observations — the quiet failure
# that went unnoticed for ~6 weeks when 46240 (Cabrillo Point) and 46284 (Soquel Cove) went
# silent in June 2026. Liveness = time since the buoy's last ACTUAL wave observation (newest
# hour in ndbc_spectral.by_hour), NOT roster membership: < 7 days = healthy, 7-30 days = a
# printed note, > 30 days = open a GitHub issue proposing MANUAL retirement. A buoy dropped
# from activestations.xml entirely is a louder, secondary signal (issue regardless of age).
#
# DETECT AND REPORT ONLY — this workflow NEVER retires a buoy, never sets/edits trust_by_buoy
# or buoy_reference, never touches spots_enriched.json or the DB. It opens/updates/closes a
# per-buoy issue and a human decides (trust-loop pattern). The watched roster is DERIVED from
# the live assignments, so a new Southeast-rollout zone is covered without editing anything.
#
# Direction-event ACCUMULATION is a separate job and IS scheduled: reverify-trust-accumulate
# runs `--reverify-tagged` twice daily (cron 0 5,17). This monitor no longer flags swell
# events for a manual run — that job is redundant now that accumulation is automated.
#
# Guardrails: no Supabase, no prod DB, no NOMADS, no secrets beyond GITHUB_TOKEN; read-only.

on:
  schedule:
    # Daily at 13:00 UTC. Liveness is a DAY-scale signal (a buoy silent for weeks needs
    # catching within a day, not every 3 h), so once daily is ample — and a daily cadence
    # keeps the per-buoy issue dedupe trivial (at most one refresh per issue per day). 13:00
    # UTC sits after NDBC's ~12Z realtime refresh and is offset from reverify's 05/17 UTC runs
    # so the two NDBC-fetching jobs don't overlap.
    - cron: '0 13 * * *'
  workflow_dispatch: {}       # manual run for testing

permissions:
  issues: write               # open/update/close the per-buoy liveness issue
  contents: read              # checkout

concurrency:
  group: buoy-liveness-monitor
  cancel-in-progress: false

jobs:
  buoy-liveness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps (read-only NDBC fetch + parse; numpy for the gate reuse)
        # numpy: the monitor derives its roster from pipeline.forecast.nwps_nearshore
        # (_tagged_nwps_zones / _retired_reference_zones), which imports numpy. requests +
        # tenacity: ndbc_spectral.by_hour's polite fetch layer. cfgrib is NOT needed (lazy —
        # the monitor never loads a NOMADS grid).
        run: python -m pip install --upgrade pip requests tenacity numpy

      - name: Download NDBC station roster (read-only, no secrets)
        # Only activestations.xml is needed — it is the roster used for DROPPED detection.
        # Per-buoy wave observations come from ndbc_spectral.by_hour, which fetches the
        # realtime spectral files directly (no latest_obs.txt needed here). If this download
        # fails the monitor degrades to age-only detection and raises NO false 'dropped'
        # alerts (it cannot assess membership from a missing roster).
        run: |
          python - <<'PY'
          import urllib.request
          from pipeline.config import NDBC_STATIONS_XML
          NDBC_STATIONS_XML.parent.mkdir(parents=True, exist_ok=True)
          url = "https://www.ndbc.noaa.gov/activestations.xml"
          req = urllib.request.Request(
              url, headers={"User-Agent": "StormyPetrel-buoy-liveness-monitor (+https://stormypetrel.surf)"})
          with urllib.request.urlopen(req, timeout=60) as r:
              body = r.read()
          NDBC_STATIONS_XML.write_bytes(body)
          print(f"downloaded {url} -> {NDBC_STATIONS_XML} ({len(body)} bytes)")
          PY

      - name: Run buoy-liveness monitor
        id: monitor
        run: python3 scripts/buoy_ready_monitor.py

      - name: Manage 'buoy-liveness' issues (per buoy — detect & report only)
        # Guard: only manage issues when the monitor emitted a health line (i.e. it ran to
        # completion). If the monitor crashed there is no output and we skip entirely — a
        # failed run must never be read as "every buoy resolved" and close all open issues.
        if: steps.monitor.outputs.health_line != ''
        uses: actions/github-script@v7
        env:
          ANY_ALERT: ${{ steps.monitor.outputs.any_alert }}
          ALERT_JSON: ${{ steps.monitor.outputs.alert_json }}      # via env (no template injection)
          HEALTH_LINE: ${{ steps.monitor.outputs.health_line }}
        with:
          script: |
            const LABEL = 'buoy-liveness';
            const ASSIGNEE = 'nunneryl';
            const { owner, repo } = context.repo;
            const alerts = JSON.parse(process.env.ALERT_JSON || '[]');   // >30d / no-data / dropped buoys
            const health = process.env.HEALTH_LINE || '';
            core.info(health);

            // 1. Ensure the label exists (create on first run).
            try {
              await github.rest.issues.getLabel({ owner, repo, name: LABEL });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: LABEL, color: 'b60205',
                  description: 'A reference buoy has stopped reporting waves (liveness)',
                });
                core.info(`created label '${LABEL}'`);
              } else {
                throw e;
              }
            }

            // 2. Existing OPEN liveness issues, keyed by a hidden per-buoy marker so a buoy
            //    shared across wfos is two distinct issues and can't collide.
            const found = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: LABEL, per_page: 100 });
            const open = found.data.filter(i => !i.pull_request);
            const markerRe = /<!-- buoy-liveness:([^\s]+) -->/;
            const keyOf = i => { const m = (i.body || '').match(markerRe); return m ? m[1] : null; };
            const marker = key => `<!-- buoy-liveness:${key} -->`;

            const titleFor = r => r.dropped
              ? `Buoy liveness: ${r.id} (${r.wfo}) dropped from NDBC roster — review`
              : `Buoy liveness: ${r.id} (${r.wfo}) silent ${r.age_days}d — review`;
            const bodyFor = r => {
              const why = r.dropped
                ? `has been **removed from NDBC's activestations.xml** (dropped from the roster)`
                : `has not produced a wave observation in **${r.age_days} days**`;
              const spots = (r.spots == null) ? 'the spot(s)' : `**${r.spots} spot(s)**`;
              return [
                `Reference buoy **${r.id}** (\`${r.wfo}\`) — ${r.zone || 'zone'} — ${why}.`,
                ``,
                `${spots} in this zone ride NWPS height with **${r.id}** as their DIRECTION `
                  + `reference. While it is silent, no direction events accumulate for the zone — `
                  + `this exact situation (46240 / 46284) went unnoticed for ~6 weeks in June 2026.`,
                ``,
                `### Heads-up only — nothing has been changed`,
                `This monitor **detects and reports only**. It has NOT retired the buoy, changed `
                  + `\`trust_by_buoy\`, edited \`buoy_reference\`, or touched \`spots_enriched.json\` `
                  + `or the DB. Buoys often come back after servicing, and an upstream NDBC outage `
                  + `must not rewrite trust state unattended.`,
                ``,
                `### If you judge the buoy genuinely gone (your call)`,
                `Move \`${r.wfo}/${r.id}\` into \`buoy_reference.retired\` in `
                  + `\`scripts/nwps_okx_assignments.json\` (or drop it from \`pending[]\`), then re-apply:`,
                '```',
                'python3 -m pipeline.apply_nwps_assignments --apply',
                '```',
                `The zone's spots keep their NWPS height and ride raycast direction (unverified) — `
                  + `the same disposition as any spot with no nearby buoy. If the buoy resumes `
                  + `reporting, this issue auto-closes.`,
                ``,
                `<sub>${health}</sub>`,
                marker(`${r.wfo}/${r.id}`),
              ].join('\n');
            };

            const alertKeys = new Set(alerts.map(r => `${r.wfo}/${r.id}`));

            // 3. Open a NEW issue for a newly-silent buoy; UPDATE the existing issue in place
            //    (no comment, no re-notify) for a buoy that is still silent — so a persistent
            //    outage does not open a fresh issue or email every single day.
            for (const r of alerts) {
              const key = `${r.wfo}/${r.id}`;
              const existing = open.find(i => keyOf(i) === key);
              if (!existing) {
                const issue = await github.rest.issues.create({
                  owner, repo, title: titleFor(r), body: bodyFor(r),
                  labels: [LABEL], assignees: [ASSIGNEE] });
                core.info(`opened buoy-liveness issue #${issue.data.number} (${key})`);
              } else {
                await github.rest.issues.update({
                  owner, repo, issue_number: existing.number, title: titleFor(r), body: bodyFor(r) });
                core.info(`refreshed buoy-liveness issue #${existing.number} (${key})`);
              }
            }

            // 4. Close any open liveness issue whose buoy is no longer alerting (resumed
            //    reporting) so the next outage re-opens a fresh one.
            for (const i of open) {
              const k = keyOf(i);
              if (k && !alertKeys.has(k)) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: i.number,
                  body: `✅ **${k}** is reporting again (or is no longer flagged). Closing — the `
                    + `monitor reopens automatically if it goes silent again.` });
                await github.rest.issues.update({
                  owner, repo, issue_number: i.number, state: 'closed' });
                core.info(`closed buoy-liveness issue #${i.number} (${k} resolved)`);
              }
            }
