name: ecmwf-wam

# ECMWF HRES-WAM deterministic wave ingestion — an ISOLATED second wave
# model that writes raw swh/pp1d/mwd into the forecasts table tagged
# source='ecmwf'. It does NOT touch the NWPS pipeline, run any rating
# math, or trigger revalidation. See pipeline/ecmwf_wam.py for the rules.
#
# Schedule: 05:00 / 17:00 UTC — ~5h after the 00Z / 12Z model cycles,
# a conservative margin for ECMWF open-data availability on the AWS
# mirror. The module's latest()-based resolver pulls the most recent
# available 00/12 cycle, so a late-landing cycle degrades to the prior
# one instead of failing.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5,17 * * *'

# Track the Node.js 24 runner default (matches the other workflows).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ecmwf-wam
  cancel-in-progress: false

jobs:
  ecmwf-wam:
    name: ecmwf-wam (HRES-WAM raw second opinion)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PYTHONUNBUFFERED: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install eccodes (GRIB2 / CCSDS backend for cfgrib)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libeccodes0

      - name: Install Python dependencies
        # Lean, self-contained install — only what this isolated module
        # needs. eccodes (python) + cfgrib decode the CCSDS-packed GRIB;
        # ecmwf-opendata pulls from s3://ecmwf-forecasts (us-east-1);
        # supabase is the existing REST client reused via db_import.
        run: |
          pip install ecmwf-opendata cfgrib eccodes xarray numpy scipy pandas "supabase>=2,<3"

      - name: Ingest ECMWF HRES-WAM → forecasts (source=ecmwf)
        run: python -m pipeline.ecmwf_wam --verbose
