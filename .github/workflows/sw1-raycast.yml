name: sw1-raycast

# Dedicated, manually-triggered job for the SW-1 swell-window raycast.
#
# The raycast needs the real GSHHG L1 land mask (~150 MB) and more wall-clock
# than the normal pipeline allows, and there is no enrich step in any cron, so
# it lives here. A GitHub-hosted runner has the open egress to download GSHHG
# and the headroom to run longer.
#
#   mode = validate (default): cast ONLY the 5 Phase-0 gate spots against GSHHG
#       and print width / ceiling / arcs / optimal to the job log. Writes
#       nothing. This is the gate — review the numbers (and re-tune thresholds
#       against GSHHG if needed) BEFORE running full.
#   mode = full: cast the whole roster with the perf path, write the swell
#       fields into spots_enriched.json for spots the raycast solves (leaving
#       the orientation-derived fallback for the rest), and commit the result
#       on a review branch (NEVER main) so the diff is reviewed before merge.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: validate (5-spot gate, no writes) or full (whole roster, commits a review branch)
        required: true
        default: validate
        type: choice
        options:
          - validate
          - full
      workers:
        description: (full only) parallel worker processes
        required: false
        default: '4'
        type: string
      debug_blockers:
        description: (validate only) dump the per-ray blocker/culprit breakdown to the log
        required: false
        default: true
        type: boolean
      sweep_mainland_solid:
        description: (validate only) sweep SWELL_MAINLAND_SOLID_KM (60/80/100/120/150 km) and print width-per-spot
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: sw1-raycast
  cancel-in-progress: false

jobs:
  raycast:
    name: sw1 raycast (${{ inputs.mode }})
    runs-on: ubuntu-latest
    # Comfortably under the 6 h platform hard cap. validate is minutes; full is
    # ~30–60 min with the perf path (4° / 90 rays + prepared geoms + per-spot
    # bbox pre-clip + multiprocessing).
    timeout-minutes: 350
    permissions:
      # full mode pushes the result branch with the default GITHUB_TOKEN.
      contents: write
    env:
      PYTHONUNBUFFERED: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install geo deps + unzip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends unzip
          # Only the raycast's geo stack — no eccodes/cfgrib needed here.
          pip install 'shapely>=2,<3' 'pyproj>=3.6,<4' 'fiona>=1.9,<2' 'numpy>=1.26,<3'

      - name: Restore geodata cache
        id: geodata-cache
        uses: actions/cache@v4
        with:
          path: pipeline/geodata
          key: geodata-v1-${{ hashFiles('pipeline/download_geodata.sh') }}

      - name: Download GSHHG (only if cache missed)
        if: steps.geodata-cache.outputs.cache-hit != 'true'
        run: bash pipeline/download_geodata.sh

      - name: Verify GSHHG L1 is present (hard fail if every mirror was down)
        run: |
          if [[ ! -s pipeline/geodata/GSHHS_f_L1.shp ]]; then
            echo "::error::GSHHG L1 shapefile missing — every download mirror failed."
            echo "The raycast cannot run without it. Re-run once a GSHHG mirror is reachable,"
            echo "or add another mirror to pipeline/download_geodata.sh."
            exit 1
          fi
          ls -lh pipeline/geodata/GSHHS_f_L1.*

      - name: Validate — 5-spot gate against GSHHG (no writes)
        if: ${{ inputs.mode == 'validate' }}
        run: python -m pipeline.sw1_raycast --mode validate ${{ inputs.debug_blockers && '--debug-blockers' || '' }} ${{ inputs.sweep_mainland_solid && '--sweep-mainland-solid' || '' }}

      - name: Full — raycast the whole roster
        if: ${{ inputs.mode == 'full' }}
        run: python -m pipeline.sw1_raycast --mode full --workers "${{ inputs.workers }}"

      - name: Commit roster arcs on a review branch (never main)
        if: ${{ inputs.mode == 'full' }}
        run: |
          set -euo pipefail
          if git diff --quiet -- pipeline/spots_enriched.json; then
            echo "::warning::No change to spots_enriched.json — nothing to commit."
            exit 0
          fi
          BR="sw1-raycast/full-${{ github.run_number }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          git add pipeline/spots_enriched.json
          git commit -m "SW-1 Phase 1: raycast swell windows over full roster (run ${{ github.run_number }})

          Generated by .github/workflows/sw1-raycast.yml (mode=full). Review the
          spots_enriched.json diff before merging; orientation_deg is untouched."
          git push -u origin "$BR"
          echo "::notice::Pushed branch $BR — open a PR to review the spots_enriched.json diff before merge."
