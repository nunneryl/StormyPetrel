name: daily-report

# Generates one AI-written surf report per region per day and upserts
# them into daily_reports. The frontend reads from that table to render
# the homepage rail + /reports + /reports/[date]/[region] pages.
#
# Schedule is tuned to land AFTER the 07:30 UTC forecast pipeline cycle
# so the underlying forecast rows are fresh. 11:00 UTC = ~7am ET, which
# is also the natural "morning report" cadence for users in the eastern
# half of the country.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  daily-report:
    name: daily-report (Claude regional summaries)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      REVALIDATE_URL: https://stormypetrel.surf/api/revalidate
      REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
      PYTHONUNBUFFERED: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Generate daily reports
        run: python -m pipeline.daily_report --verbose

      - name: Revalidate ISR cache (home + /reports + today's date page)
        run: python -m pipeline.revalidate --scope daily
