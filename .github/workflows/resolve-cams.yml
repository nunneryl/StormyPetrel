name: resolve-cams

# Refreshes the resolved YouTube live-video ID for every youtube-provider
# cam in the cams table. Runs every 4 hours; live streams cycle (some
# providers start a fresh video each morning), so 4h keeps the embeds
# pointing at the current broadcast.
#
# Surfchex / Explore rows are static — they don't need this job.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  resolve-cams:
    name: resolve-cams (YouTube live IDs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      PYTHONUNBUFFERED: '1'
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Resolve cam embeds
        run: python -m pipeline.resolve_cams --verbose
